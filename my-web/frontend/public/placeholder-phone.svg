<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <rect width="200" height="200" fill="#f5f5f9" rx="20"/>
  <!-- Outline of a modern smartphone with rounded corners -->
  <rect x="65" y="30" width="70" height="140" rx="14" fill="none" stroke="#5E5CE6" stroke-width="4" opacity="0.6"/>
  <!-- Speaker screen bar at the top -->
  <line x1="90" y1="40" x2="110" y2="40" stroke="#5E5CE6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Decorative camera lens circle -->
  <circle cx="100" cy="85" r="16" fill="none" stroke="#5E5CE6" stroke-width="3" opacity="0.4"/>
  <circle cx="100" cy="85" r="6" fill="#5E5CE6" opacity="0.4"/>
  <!-- Soft text label -->
  <text x="100" y="145" font-family="'SF Pro Display', 'Inter', sans-serif" font-size="10" font-weight="bold" fill="#5E5CE6" text-anchor="middle" letter-spacing="1" opacity="0.7">PHONE SHOP</text>
</svg>
