# =============================================================================
# CI/CD Pipeline - Sóc Mobile PHONE_SHOP
# Triggers: Push to main/develop, Pull Requests to main
#
# Jobs:
#   1. Lint & Type Check (Frontend + Backend)
#   2. Build Production (Frontend + Backend)
#   3. Unit Tests (Backend)
#   4. Deploy Preview (on PR) / Deploy Production (on push to main)
# =============================================================================

name: 🐿️ Sóc Mobile CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Frontend - Lint, TypeCheck & Build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: 🖥️ Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-web/frontend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: my-web/frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 ESLint check
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build production bundle (includes TypeScript check)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📊 Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: my-web/frontend/.next
          retention-days: 7
          include-hidden-files: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Backend - Lint, Build & Test
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: ⚙️ Backend (NestJS + Prisma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-web/backend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: my-web/backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Generate Prisma Client
        run: npx prisma generate

      - name: 🔍 ESLint check
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build production bundle
        run: npm run build

      - name: 🧪 Run unit tests
        run: npm run test -- --passWithNoTests
        continue-on-error: true

      - name: 📊 Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: my-web/backend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy (only on push to main, after both jobs pass)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: my-web/frontend/.next

      - name: 📥 Download backend build
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: my-web/backend/dist

      # ── Deploy Frontend to Vercel (if configured) ──
      - name: 🌐 Deploy Frontend to Vercel
        if: env.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: my-web/frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: ✅ Deployment Summary
        run: |
          echo "╔═══════════════════════════════════════════════════╗"
          echo "║  🐿️  Sóc Mobile - Deployment Successful!         ║"
          echo "║                                                   ║"
          echo "║  ✅ Frontend Build: PASSED                        ║"
          echo "║  ✅ Backend Build:  PASSED                        ║"
          echo "║  ✅ TypeScript:     VALIDATED                     ║"
          echo "║  ✅ Production:     DEPLOYED                      ║"
          echo "║                                                   ║"
          echo "║  📍 Showroom: Số 180 Nguyễn Trãi, Thanh Xuân, HN ║"
          echo "╚═══════════════════════════════════════════════════╝"
